        <h1>Contact Me</h1>

        <p>
            Feel free to reach out regarding projects, collaborations,
            internships, or professional opportunities.
        </p>
    </section>

    <section>
        <h2>Send a Message</h2>

        <form aria-label="Contact Form">

            <div>
                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    required
                >
            </div>

            <div>
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                >
            </div>

            <div>
                <label for="subject">Subject</label>
                <input
                    type="text"
                    id="subject"
                    name="subject"
                    required
                >
            </div>

            <div>
                <label for="message">Message</label>
                <textarea
                    id="message"
                    name="message"
                    rows="6"
                    required
                ></textarea>
            </div>

            <button type="submit">
                Send Message
            </button>

        </form>
    </section>
